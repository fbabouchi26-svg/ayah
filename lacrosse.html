<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lacrosse &mdash; Ayah</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:     #2d6a4f;
      --green-mid: #40916c;
      --green-lt:  #74c69d;
      --mint:      #d8f3dc;
      --gold:      #e9c46a;
      --white:     #f8fff9;
      --dark:      #1b3a2d;
      --muted:     #5a7a6a;
    }

    body { font-family: 'Nunito', sans-serif; background: var(--white); min-height: 100vh; color: var(--dark); }

    header {
      background: linear-gradient(135deg, var(--green) 0%, var(--green-mid) 100%);
      padding: 2rem 1.5rem 2.8rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 15% 85%, rgba(233,196,106,0.18) 0%, transparent 40%),
        radial-gradient(circle at 85% 20%, rgba(116,198,157,0.2) 0%, transparent 40%);
      pointer-events: none;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0; right: 0;
      height: 32px;
      background: var(--white);
      clip-path: ellipse(55% 100% at 50% 100%);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 1rem;
      position: relative;
      z-index: 1;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--gold); }

    .header-icon { font-size: 2rem; display: block; margin-bottom: 0.5rem; position: relative; z-index: 1; }
    .header-title {
      font-size: clamp(2rem, 7vw, 3.2rem);
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.01em;
      line-height: 1;
      text-shadow: 0 2px 12px rgba(0,0,0,0.15);
      position: relative;
      z-index: 1;
    }
    .header-sub {
      margin-top: 0.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      border-bottom: 2px solid var(--mint);
      padding-bottom: 0;
    }
    .tab-btn {
      background: none;
      border: none;
      padding: 0.7rem 1.4rem;
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      font-weight: 800;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      letter-spacing: 0.04em;
      transition: color 0.2s, border-color 0.2s;
      border-radius: 8px 8px 0 0;
    }
    .tab-btn:hover { color: var(--green); }
    .tab-btn.active {
      color: var(--green);
      border-bottom-color: var(--green);
      background: var(--mint);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    main { max-width: 720px; margin: 0 auto; padding: 2.5rem 1.2rem 4rem; }

    .section-label {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 1.2rem;
    }

    /* Info link cards */
    .links-grid { display: flex; flex-direction: column; gap: 0.85rem; }

    .link-card {
      display: flex;
      align-items: center;
      gap: 1.1rem;
      background: #fff;
      border: 2px solid var(--mint);
      border-radius: 16px;
      padding: 1.05rem 1.3rem;
      text-decoration: none;
      color: var(--dark);
      transition: all 0.22s;
      box-shadow: 0 2px 8px rgba(45,106,79,0.06);
    }
    .link-card:hover {
      border-color: var(--green-lt);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(45,106,79,0.14);
      background: var(--mint);
    }
    .card-icon {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: 900;
      flex-shrink: 0;
    }
    .icon-doc  { background: #e8f0fe; color: #2563eb; }
    .icon-cal  { background: #fff3cd; color: #b45309; }
    .icon-sport { background: #d8f3dc; color: var(--green); }
    .card-text { flex: 1; }
    .card-title { font-weight: 800; font-size: 1rem; line-height: 1.2; }
    .card-desc { font-size: 0.82rem; color: var(--muted); margin-top: 0.15rem; font-weight: 600; }
    .card-arrow { font-size: 1.2rem; color: var(--green-lt); transition: transform 0.2s; font-weight: 700; }
    .link-card:hover .card-arrow { transform: translateX(4px); color: var(--green); }

    /* Video cards */
    .videos-grid {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .video-card {
      background: #fff;
      border: 2px solid var(--mint);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(45,106,79,0.06);
      transition: box-shadow 0.22s, border-color 0.22s;
    }
    .video-card:hover {
      border-color: var(--green-lt);
      box-shadow: 0 6px 20px rgba(45,106,79,0.14);
    }

    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
    }
    .video-wrapper iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    footer { text-align: center; padding: 1.5rem; font-size: 0.8rem; color: var(--muted); font-weight: 600; }
    footer span { color: var(--green-lt); }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="back-link">&larr; Back to my links</a>
    <span class="header-icon">&#129455;</span>
    <h1 class="header-title">Lacrosse</h1>
    <p class="header-sub">Player &middot; Team &middot; Season</p>
  </header>

  <main>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('info', this)">&#8505; Info</button>
      <button class="tab-btn" onclick="switchTab('videos', this)">&#9654; Videos</button>
    </div>

    <!-- INFO TAB -->
    <div id="tab-info" class="tab-panel active">
      <p class="section-label">Team Info</p>
      <div class="links-grid">

        <a href="https://www.franklinma.gov/DocumentCenter/View/5066/5-6-Rosters--Schedule?bidId=" target="_blank" class="link-card">
          <div class="card-icon icon-doc">&#128196;</div>
          <div class="card-text">
            <div class="card-title">Roster &amp; Schedule</div>
            <div class="card-desc">Grade 5&ndash;6 team roster and game schedule</div>
          </div>
          <span class="card-arrow">&rarr;</span>
        </a>

      </div>
    </div>

    <!-- VIDEOS TAB -->
    <div id="tab-videos" class="tab-panel">
      <p class="section-label">Watch &bull; 6 Videos</p>
      <div class="videos-grid">

        <div class="video-card">
          <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/hJrNHWJEYa4" title="Lacrosse video 1" allowfullscreen></iframe>
          </div>
        </div>

        <div class="video-card">
          <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/26b_aesIafk" title="Lacrosse video 2" allowfullscreen></iframe>
          </div>
        </div>

        <div class="video-card">
          <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/qne2oBCOPNU" title="Lacrosse video 3" allowfullscreen></iframe>
          </div>
        </div>

        <div class="video-card">
          <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/psBgWXV2mVs" title="Lacrosse video 4" allowfullscreen></iframe>
          </div>
        </div>

        <div class="video-card">
          <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/i802zDEarQg" title="Lacrosse video 5" allowfullscreen></iframe>
          </div>
        </div>

        <div class="video-card">
          <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/7deaRXF70Q8" title="Lacrosse video 6" allowfullscreen></iframe>
          </div>
        </div>

      </div>
    </div>

  </main>

  <footer>
    Made with <span>&hearts;</span> &middot; Ayah's Links
  </footer>

  <script>
    function switchTab(name, btn) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      btn.classList.add('active');
    }
  </script>

</body>
</html>
